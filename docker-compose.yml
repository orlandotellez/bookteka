services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookteka
      POSTGRES_PASSWORD: bookteka123
      POSTGRES_DB: bookteka_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookteka"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://bookteka:bookteka123@db:5432/bookteka_db?schema=public
      FRONTEND_URL: http://localhost:8081,http://192.168.0.10:8081
      TRUST_BACKEND_ORIGINS: "true"
      BETTER_AUTH_SECRET: WsEGMicmTmVF0Tln8NEkfwZkrEmIePQB
      BETTER_AUTH_URL: http://192.168.0.10:8081
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_ENDPOINT: https://dummy.r2.com
      R2_PUBLIC_DOMAIN: https://dummy.r2.com
      R2_BUCKET: dummy
      RESEND_API_KEY: re_dummy
      RESEND_FROM_EMAIL: dummy@resend.dev
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./web-app
      args:
        VITE_API_URL: /api
    ports:
      - "8081:8080"
    depends_on:
      - backend

volumes:
  pgdata:
