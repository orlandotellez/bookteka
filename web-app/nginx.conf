events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Resolver DNS interno de Railway
    resolver 8.8.8.8;

    server {
        listen 8080;
        server_name bookteka.up.railway.app;

        # === FRONTEND ===
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # === BACKEND API ===
        location /api/ {
            # El dominio interno se pasa via variable de entorno
            # Railway pasa esta variable automáticamente al contenedor
            set $backend_host ${BACKEND_HOST};
            
            proxy_pass https://$backend_host;
            
            proxy_http_version 1.1;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
